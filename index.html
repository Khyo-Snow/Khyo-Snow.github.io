  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(4, 4, 12, 0.45);
  }

  .slider-wrapper {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 1;
  }

  .slider {
    display: flex;
    width: 200vw;
    height: 100vh;
    transition: transform 0.6s cubic-bezier(0.77,0,0.18,1);
  }

  .slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    flex-shrink: 0;
  }

  .card {
    background: rgba(22, 22, 32, 0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 22px;
    padding: 32px 36px;
    width: 100%;
    max-width: 860px;
  }

  .main-card {
    display: flex;
    align-items: center;
    gap: 48px;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 200px;
  }

  .avatar-wrap {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.12);
  }
  .avatar-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .tag {
    font-size: 11px;
    letter-spacing: 0.16em;
    color: #7a7a9a;
    margin-top: 6px;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #e8e8f4;
    line-height: 1.1;
  }

  .bio {
    font-size: 13px;
    color: #9090b0;
    font-weight: 300;
    line-height: 1.5;
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    height: 52px;
    border-radius: 999px;
    background: rgba(30, 30, 44, 0.85);
    border: 1px solid rgba(255,255,255,0.07);
    color: #c8c8e0;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
  }
  .btn:hover {
    background: rgba(40, 40, 58, 0.95);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-1px);
  }
  .btn:active { transform: scale(0.98); }

  .btn-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-icon svg { width: 18px; height: 18px; }

  .building-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .building-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-style: italic;
    font-weight: 700;
    color: #e8e8f4;
  }

  .roblox-img {
    width: 220px;
    height: 220px;
    border-radius: 16px;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .building-soon {
    font-size: 13px;
    color: #7a7a9a;
    letter-spacing: 0.1em;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #7a7a9a;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Outfit', sans-serif;
    margin-top: 8px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: #c8c8e0; }

  @media (max-width: 640px) {
    .main-card { flex-direction: column; align-items: flex-start; gap: 24px; padding: 24px 20px; }
    .name { font-size: 26px; }
    .roblox-img { width: 180px; height: 180px; }
  }
</style>
